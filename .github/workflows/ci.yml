name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install lint dependencies
        run: sudo apt-get update && sudo apt-get install -y zsh ripgrep

      - name: Syntax check zsh files
        run: zsh -n tmux-ai-summarize.tmux scripts/*.zsh test/*.zsh

      - name: Check harness regressions
        run: zsh ./test/harness-regressions.sh

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install integration dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux zsh curl jq ripgrep bsdutils python3 perl

      - name: Run integration harness
        run: ./test/integration.sh
